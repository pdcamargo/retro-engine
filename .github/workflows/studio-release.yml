name: Release (studio)

on:
  push:
    tags:
      - "studio-v*"

jobs:
  build:
    name: Build studio (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 30
    permissions:
      contents: write
      packages: read

    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Linux Tauri prerequisites
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build engine packages
        run: bunx turbo run build

      # The studio ships Bun as a Tauri sidecar (externalBin) so it can build a
      # user's project without a user-installed runtime. Stage the runner's Bun
      # under the host target triple the bundler expects.
      - name: Stage Bun sidecar
        shell: bash
        run: |
          TRIPLE=$(rustc -vV | sed -n 's/^host: //p')
          mkdir -p apps/studio/src-tauri/binaries
          SRC="$(command -v bun)"
          if [[ "$TRIPLE" == *windows* ]]; then
            cp "${SRC}.exe" "apps/studio/src-tauri/binaries/bun-${TRIPLE}.exe" 2>/dev/null || cp "$SRC" "apps/studio/src-tauri/binaries/bun-${TRIPLE}.exe"
          else
            cp "$SRC" "apps/studio/src-tauri/binaries/bun-${TRIPLE}"
          fi
          ls -l apps/studio/src-tauri/binaries

      - name: Build and release studio
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/studio
          tagName: ${{ github.ref_name }}
          releaseName: "Studio ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
