pre-commit:
  parallel: true
  commands:
    oxlint:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs}"
      run: bunx oxlint {staged_files}

pre-push:
  parallel: false
  commands:
    lint:
      run: bunx turbo run lint
    typecheck:
      run: bunx turbo run typecheck
    test:
      run: bunx turbo run test
    # bench temporarily removed from the pre-push gate — re-add when ready:
    # bench:
    #   # Runs every bench end-to-end; catches compile / runtime drift in bench
    #   # files. Does NOT compare against committed baselines — see CLAUDE.md §11
    #   # and ADR-0017 §5 for why pre-push doesn't gate on perf numbers
    #   # (`bench:check` stays a local, pre-PR step).
    #   run: bunx turbo run bench
